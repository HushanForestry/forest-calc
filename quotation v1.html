<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>對我生材｜原木自動估價系統</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #2d5a27; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #e8ede8; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #4a4a4a; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .result-panel { background: #fdfcf0; border-radius: 12px; padding: 20px; margin-top: 20px; border: 1px solid #dcdca4; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
        .res-label { color: #666; }
        .res-value { font-weight: bold; color: #333; }
        .price-total { font-size: 28px; color: #b33939; border-top: 1px solid #dcdca4; margin-top: 10px; padding-top: 10px; }
        .hint { font-size: 11px; color: #999; text-align: center; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>🌲 原木自動估價</h2>
    
    <div class="form-group">
        <label>樹種選擇</label>
        <select id="treeType" onchange="calc()">
            <option value="Sugi">柳杉 / 台灣杉</option>
            <option value="Fir">福杉 (進口/本地)</option>
        </select>
    </div>

    <div class="form-group">
        <label>末口直徑 (台寸)</label>
        <input type="number" id="diameter" placeholder="請輸入寸" oninput="calc()">
    </div>

    <div class="form-group">
        <label>長度 (台尺)</label>
        <input type="number" id="length" placeholder="請輸入尺" oninput="calc()">
    </div>

    <div class="form-group">
        <label>數量 (支)</label>
        <input type="number" id="qty" value="1" oninput="calc()">
    </div>

    <div class="result-panel">
        <div class="res-row">
            <span class="res-label">對照單價：</span>
            <span class="res-value">$ <span id="unitPrice">0</span> / 才</span>
        </div>
        <div class="res-row">
            <span class="res-label">總材積：</span>
            <span class="res-value"><span id="totalVol">0.0</span> 才</span>
        </div>
        <div class="res-row price-total">
            <span class="res-label" style="font-size: 18px;">預估總金額：</span>
            <span id="totalPrice">0</span>
        </div>
    </div>

    <p class="hint">
        ※ 報價參考「2025虎山原木單價表」<br>
        ※ 實際價格依現地看貨與運距為準
    </p>
</div>

<script>
    function getUnitPrice(type, d, l) {
        // 邏輯參考自用戶提供的試算表
        if (type === "Sugi") {
            // 柳杉與台灣杉邏輯
            if (d <= 10) return 12;
            if (d <= 30) return 12;
            if (d > 30) return 15;
            return 12;
        } else if (type === "Fir") {
            // 福杉邏輯
            if (d <= 10) return 13;
            if (d <= 30) return 15;
            if (d <= 40) return 18;
            return 20;
        }
        return 0;
    }

    function calc() {
        const type = document.getElementById('treeType').value;
        const d = parseFloat(document.getElementById('diameter').value);
        const l = parseFloat(document.getElementById('length').value);
        const qty = parseFloat(document.getElementById('qty').value);

        if (d > 0 && l > 0 && qty > 0) {
            // 1. 計算才數
            const vol = (d * d * l / 10) * qty;
            
            // 2. 獲取單價
            const up = getUnitPrice(type, d, l);
            
            // 3. 計算總價
            const total = vol * up;

            document.getElementById('unitPrice').innerText = up;
            document.getElementById('totalVol').innerText = vol.toFixed(1);
            document.getElementById('totalPrice').innerText = "$" + Math.round(total).toLocaleString();
        } else {
            document.getElementById('unitPrice').innerText = "0";
            document.getElementById('totalVol').innerText = "0.0";
            document.getElementById('totalPrice').innerText = "0";
        }
    }
</script>

</body>
</html>
