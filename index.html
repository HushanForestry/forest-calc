<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木材材積快速計算</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f1ea; color: #3e2723; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #8d6e63; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 90%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .result { background: #efebe9; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        #total { font-size: 24px; color: #5d4037; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🪵 原木材積計算 (台制)</h2>
    <div class="input-group">
        <label>末口直徑 (台寸)</label>
        <input type="number" id="diameter" placeholder="例如: 8" oninput="calculate()">
    </div>
    <div class="input-group">
        <label>長度 (台尺)</label>
        <input type="number" id="length" placeholder="例如: 12" oninput="calculate()">
    </div>
    <div class="input-group">
        <label>數量 (支)</label>
        <input type="number" id="count" value="1" oninput="calculate()">
    </div>

    <div class="result">
        <div>總計材積</div>
        <span id="total">0</span> 才
    </div>
    <p style="font-size: 12px; color: #888;">* 公式：(寸 × 寸 × 尺 / 10) × 數量</p>
</div>

<script>
    function calculate() {
        const d = document.getElementById('diameter').value;
        const l = document.getElementById('length').value;
        const n = document.getElementById('count').value;
        
        if (d && l && n) {
            const result = (d * d * l / 10) * n;
            document.getElementById('total').innerText = result.toFixed(1);
        } else {
            document.getElementById('total').innerText = "0";
        }
    }
</script>

</body>
</html>
